services:
  app:
    build: .
    container_name: api
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: myapp
      URL_GATEWAY: http://gateways-mock
    depends_on:
      mysql:
        condition: service_healthy
      gateways-mock:
        condition: service_started
    command: sh -c "node ace migration:run --disable-locks && node ace db:seed && npm run dev"

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: myapp
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  gateways-mock:
    image: matheusprotzen/gateways-mock
    ports:
      - "3001:3001"
      - "3002:3002"

volumes:
  db_data:
    driver: local
